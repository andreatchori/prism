services:
  prism:
    build: .
    ports:
      - "${PRISM_PORT:-8080}:8080"
    environment:
      PRISM_PORT: "8080"
      PRISM_CONFIG: /app/config/examples/rules.toml
      PRISM_REPOS_DIR: /app/config/repos
      PRISM_ENGINE: /app/bin/prism-engine
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.com}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-}
      AZURE_DEVOPS_ORG: ${AZURE_DEVOPS_ORG:-}
      AZURE_DEVOPS_PAT: ${AZURE_DEVOPS_PAT:-}
      AZURE_WEBHOOK_SECRET: ${AZURE_WEBHOOK_SECRET:-}
      BITBUCKET_USERNAME: ${BITBUCKET_USERNAME:-}
      BITBUCKET_APP_PASSWORD: ${BITBUCKET_APP_PASSWORD:-}
      BITBUCKET_TOKEN: ${BITBUCKET_TOKEN:-}
      BITBUCKET_WEBHOOK_SECRET: ${BITBUCKET_WEBHOOK_SECRET:-}
    volumes:
      - ./config/examples/rules.toml:/app/config/examples/rules.toml:ro
      - ./config/repos:/app/config/repos:ro
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
